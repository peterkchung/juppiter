# About: FAST-LIO2 Configuration
# Dev tier LIO estimator configuration

fast_lio2:
  ros__parameters:
    lidar:
      type: "livox"
      blind: 0.5
      det_range: 100.0
      point_filter_num: 3

    map:
      filter_size_map: 0.5
      surrounding_keyframe_num: 50
      mapping_surf_size: 0.5

    imu:
      topic: "/imu/data"
      imu_en: true
      extrinsic_t_imu_lidar: [0.0, 0.0, 0.0]
      extrinsic_r_imu_lidar: [1.0, 0.0, 0.0, 0.0]
      acc_cov: 0.1
      gyr_cov: 0.1
      b_acc_cov: 0.0001
      b_gyr_cov: 0.0001

    filter:
      max_iterations: 3
      converge_thresh: 0.001

    runtime:
      pub_odom: true
      pub_path: true
      pub_point_cloud: true
      frame_id: "map"
      child_frame_id: "base_link"

    adaptive:
      base_voxel_size: 0.1
      min_points_threshold: 5000
