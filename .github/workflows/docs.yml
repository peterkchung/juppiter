name: Documentation

on:
  push:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r docs/requirements.txt

      - name: Build documentation
        run: |
          cd docs
          mkdocs build --strict

      - name: Upload build artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: docs/site/
          retention-days: 7

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r docs/requirements.txt

      - name: Build site
        run: |
          cd docs
          mkdocs build

      - name: Deploy to docs branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # Fetch the docs branch if it exists
          git fetch origin docs || true
          
          # Create or checkout docs branch
          if git show-ref --quiet refs/remotes/origin/docs; then
            git checkout docs
          else
            git checkout --orphan docs
            git rm -rf .
          fi
          
          # Remove all files except .git
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          
          # Copy built site
          cp -r docs/site/* .
          
          # Create .nojekyll
          touch .nojekyll
          
          # Add all files
          git add .
          
          # Commit (will fail if no changes, which is ok)
          git commit -m "deploy documentation from ${GITHUB_REF_NAME}: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || true
          
          # Push to docs branch
          git push origin docs --force
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
